            <h2 id="guida-allutilizzo-del-file-javascript-con-koinly">🚀 Guida all'Utilizzo del File JavaScript con
                Koinly</h2>
            <h2 id="introduzione">📖 Introduzione</h2>
            <p>
                Questo documento fornisce istruzioni su come utilizzare il file
                JavaScript nella console del browser per interagire con Koinly
                dopo aver generato il report delle transazioni.
            </p>
            <h2 id="prerequisiti">✅ Prerequisiti</h2>
            <ul>
                <li>
                    Un browser web moderno (Chrome, Firefox, Safari, etc.).
                </li>
                <li>
                    Accesso a Koinly con le credenziali necessarie per
                    visualizzare e gestire i dati delle transazioni.
                </li>
            </ul>
            <h2 id="passaggi-per-lutilizzo">🛠️ Passaggi per l'Utilizzo</h2>
            <h3>
                1. Generazione del Report su Koinly
            </h3>
            <ol>
                <li>
                    Accedi al tuo account Koinly su
                    <a href="https://app.koinly.io" target="_blank">https://app.koinly.io</a
                    >.
                </li>
                <li>
                    Naviga fino alla sezione che ti permette di generare il
                    report desiderato, come ad esempio il report delle
                    transazioni o il report fiscale per un anno specifico.
                </li>
                <li>
                    Segui le istruzioni fornite da Koinly per generare e
                    scaricare il report in formato desiderato (ad esempio PDF,
                    CSV).
                </li>
            </ol>


            <h3>
                2. Preparazione del File JavaScript
            </h3>
            <p>
                Copia il seguente codice JavaScript (che andrai ad eseguire direttamente nella console del browser nel
                passaggio successivo). Puoi usare l'apposito tasto "Copy" per copiarlo rapidamente negli appunti.
            </p>

            <div class="code-wrapper" style="position: relative; margin: 2rem 0;">
                <button class="copy-btn"
                        style="position: absolute; top: 1rem; right: 1rem; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--glass-border); color: var(--text-primary); padding: 0.4rem 0.8rem; border-radius: 8px; cursor: pointer; font-family: 'Google Sans Flex', sans-serif; font-size: 0.85rem; transition: all 0.2s; z-index: 10;"
                        onmouseover="this.style.background='rgba(255, 255, 255, 0.2)'"
                        onmouseout="this.style.background='rgba(255, 255, 255, 0.1)'"
                        onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText); this.innerText='Copied!'; setTimeout(()=>this.innerText='Copy', 2000);">
                    Copy
                </button>
                <pre><code class="language-javascript">(function () {
  const YEAR = 2025;
  const PAGE_COUNT = 25;

  const getCookie = (name) => {
    const cookies = document.cookie.split("; ");
    const cookieMap = cookies
      .map((it) => it.split("="))
      .reduce((prev, curr) => {
        const [key, value] = curr;
        return { ...prev, [key]: value };
      }, {});
    return cookieMap[name];
  };

  const fetchHeaders = () => {
    const headers = new Headers();
    headers.append("authority", "api.koinly.io");
    headers.append("accept", "application/json, text/plain, */*");
    headers.append("accept-language", "en-GB,en-US;q=0.9,en;q=0.8");
    headers.append("access-control-allow-credentials", "true");
    headers.append("caches-requests", "1");
    headers.append("cookie", document.cookie);
    headers.append("origin", "https://app.koinly.io");
    headers.append("referer", "https://app.koinly.io/");
    headers.append("sec-fetch-dest", "empty");
    headers.append("sec-fetch-mode", "cors");
    headers.append("sec-fetch-site", "same-site");
    headers.append("sec-gpc", "1");
    headers.append("user-agent", navigator.userAgent);
    headers.append("x-auth-token", getCookie("API_KEY"));
    headers.append("x-portfolio-token", getCookie("PORTFOLIO_ID"));
    return headers;
  };

  const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

  const fetchSession = async () => {
    const requestOptions = { method: "GET", headers: fetchHeaders(), redirect: "follow" };
    const response = await fetch("https://api.koinly.io/api/sessions", requestOptions);
    return response.json();
  };

  const fetchPage = async (pageNumber) => {
    const requestOptions = { method: "GET", headers: fetchHeaders(), redirect: "follow" };
    const response = await fetch(
      `https://api.koinly.io/api/transactions?per_page=${PAGE_COUNT}&order=date&q[m]=and&q[g][0][date_gteq]=${YEAR}-01-01T00%3A00%3A00.000Z&q[g][0][date_lt]=${YEAR}-12-31T23%3A59%3A59.999Z&page=${pageNumber}`,
      requestOptions
    );
    return response.json();
  };

  // --- LOGICA DI POLLING PER IL REPORT FISCALE ---
  const fetchTax = async () => {
    const requestOptions = { method: "GET", headers: fetchHeaders(), redirect: "follow" };
    const url = `https://api.koinly.io/api/stats/tax?year=${YEAR}`;
    
    let response = await fetch(url, requestOptions);
    let data = await response.json();
    
    let attempts = 0;
    while ((data.results == null && data.status !== "completed") && attempts < 15) {
        console.log(`⏳ Koinly sta elaborando il Report Fiscale per il ${YEAR}... Attendo 3 secondi (tentativo ${attempts + 1}/15)`);
        await delay(3000);
        response = await fetch(url, requestOptions);
        data = await response.json();
        attempts++;
    }
    
    if (data.results == null) {
        console.warn(`⚠️ Attenzione: Koinly non ha restituito i dati fiscali completi dopo ${attempts} tentativi. Il JSON potrebbe essere parziale.`);
    }
    
    return data;
  };

  // --- LOGICA DI POLLING PER I BILANCI (HOLDINGS) ---
  const fetchHoldings = async () => {
    const requestOptions = { method: "GET", headers: fetchHeaders(), redirect: "follow" };
    const url = `https://api.koinly.io/api/stats/holdings?date=${YEAR}-12-31T23:59:59.999Z`;
    
    let response = await fetch(url, requestOptions);
    let data = await response.json();
    
    let attempts = 0;
    while ((data.results == null && data.status !== "completed") && attempts < 15) {
        console.log(`⏳ Koinly sta elaborando i Bilanci per il ${YEAR}... Attendo 3 secondi (tentativo ${attempts + 1}/15)`);
        await delay(3000);
        response = await fetch(url, requestOptions);
        data = await response.json();
        attempts++;
    }
    
    return data;
  };

  const fetchInvestments = async (transactionId, page) => {
    const requestOptions = { method: "GET", headers: fetchHeaders(), redirect: "follow" };
    const response = await fetch(`https://api.koinly.io/api/investments?q[transaction_id_eq]=` + transactionId + "&page=" + page, requestOptions);
    return response.json();
  };

  // --- PAGINAZIONE PER SCARICARE TUTTI I WALLET ---
  const fetchAllWallets = async () => {
    const allWallets = [];
    let currentPage = 1;
    let totalPages;
    const requestOptions = { method: "GET", headers: fetchHeaders(), redirect: "follow" };

    do {
      const response = await fetch(`https://api.koinly.io/api/wallets?per_page=100&with_api_options=1&q[sorts]=created_at%20desc&q[pool_true]=0&page=${currentPage}`, requestOptions);
      const data = await response.json();
      
      if (data.wallets) {
        allWallets.push(...data.wallets);
      }
      
      totalPages = data.meta ? data.meta.page.total_pages : 1;
      currentPage++;
      await delay(150);
    } while (currentPage <= totalPages);

    return allWallets;
  };

  const getAllTransactions = async () => {
    console.log("⏳ Calcolo del numero totale di pagine per le transazioni...");
    const firstPage = await fetchPage(1);
    const totalPages = firstPage.meta.page.total_pages;
    const promises = [];
    
    for (let i = 2; i <= totalPages; i++) {
      promises.push(fetchPage(i));
      await delay(100); 
    }
    const remainingPages = await Promise.all(promises);
    const allPages = [firstPage, ...remainingPages];
    return allPages.flatMap((it) => it.transactions);
  };

  const downloadJSON = (data, filename) => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  };

  async function fetchAllInvestments(transactionId) {
    const allInvestments = [];
    let currentPage = 1;
    let totalPages;
    do {
      const inv = await fetchInvestments(transactionId, currentPage);
      if (inv.investments) {
        allInvestments.push(...inv.investments);
      }
      totalPages = inv.meta ? inv.meta.page.total_pages : 1;
      currentPage++;
      await delay(150);
    } while (currentPage <= totalPages);
    return allInvestments;
  }

  // Funzione per disegnare la barra di progresso
  const printProgressBar = (current, total, prefix = "") => {
    const barLength = 40;
    const percent = total > 0 ? (current / total) : 1;
    const filledLength = Math.round(barLength * percent);
    const bar = '█'.repeat(filledLength) + '░'.repeat(barLength - filledLength);
    const percentageString = (percent * 100).toFixed(1);
    console.log(`${prefix} [${bar}] ${percentageString}% (${current}/${total})`);
  };

  const run = async () => {
    try {
      console.log("=========================================");
      console.log("🚀 INIZIO ESTRAZIONE DATI KOINLY 🚀");
      console.log("=========================================");
      
      console.log("📥 Fase 1/4: Recupero Sessione e Report Fiscale...");
      const session = await fetchSession();
      const tax = await fetchTax();
      const baseCurrency = session.portfolios && session.portfolios[0] ? session.portfolios[0].base_currency.symbol : "EUR";
      console.log("✅ Sessione e Tasse recuperate con successo!");
      
      console.log("📥 Fase 2/4: Download di tutte le Transazioni base...");
      let transactions = await getAllTransactions();
      console.log(`✅ Trovate ${transactions.length} transazioni!\n`);
      
      console.log("📥 Fase 3/4: Estrazione dettagli Investimenti (richiede tempo)...");
      const targetTransactions = transactions.filter(t => t.fee != null || t.type === "exchange" || t.type === "sell" || (t.gain != null && parseFloat(t.gain) !== 0));
      const totalToProcess = targetTransactions.length;
      let processedCount = 0;
      
      let processedTransactions = [];
      for (const transaction of transactions) {
        if (transaction.fee != null || transaction.type === "exchange" || transaction.type === "sell" || (transaction.gain != null && parseFloat(transaction.gain) !== 0)) {
          try {
            processedCount++;
            printProgressBar(processedCount, totalToProcess, "⏳ In elaborazione:");

            const investments = await fetchAllInvestments(transaction.id);
            transaction.investments = investments;
            await delay(250);
          } catch (e) {
            console.error("\n❌ Errore recupero investimenti per transazione ID: " + transaction.id, e);
          }
        }
        processedTransactions.push(transaction);
      }
      transactions = processedTransactions;
      console.log("\n✅ Dettagli Investimenti scaricati completamente!\n");
      
      console.log("📥 Fase 4/4: Download Bilanci (Holdings) e Portafogli (Wallets)...");
      const holdings = await fetchHoldings();
      const allWalletsList = await fetchAllWallets();
      console.log(`✅ Bilanci e Portafogli recuperati! (Trovati ${allWalletsList.length} portafogli)\n`);
      
      const data = {
        year: YEAR,
        baseCurrency: baseCurrency,
        tax: tax,
        transactions: transactions,
        holdings: holdings,
        wallets: allWalletsList,
      };
      
      console.log("🎉 TUTTO FATTO! Preparazione del file per il download in corso...");
      downloadJSON(data, "koinly_data_" + new Date().toLocaleString().replace(/[\/:]/g, "_") + ".json");
      console.log("=========================================");
      console.log("💾 FILE SALVATO SUL TUO COMPUTER! 💾");
      console.log("=========================================");
      
    } catch (error) {
      console.error("\n❌ ERRORE CRITICO DURANTE L'ESECUZIONE:", error);
    }
  };

  run();
})();</code></pre>
